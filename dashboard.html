<!-- /Tui/dashboard.html -->
<!-- Modal Dashboard - Phần HTML -->
<div class="modal-overlay" id="dashboardModal">
    <div class="modal-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Đang tải dữ liệu từ sheet...</div>
        </div>

        <!-- Header -->
        <div class="modal-header">
            <h2><i class="fas fa-chart-pie"></i> Bảng điều khiển Thu Chi</h2>
            <div style="display:flex; gap:8px;">
                <button class="btn-refresh" onclick="refreshData()"><i class="fas fa-sync"></i> Tải lại</button>
                <button class="btn-close" onclick="closeDashboard()">✕</button>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="filter-group">
                <label><i class="far fa-calendar-alt"></i> Kỳ:</label>
                <select id="periodFilter">
                    <option value="all">Tất cả</option>
                    <option value="today">Hôm nay</option>
                    <option value="week">Tuần này</option>
                    <option value="month">Tháng này</option>
                    <option value="quarter">Quý này</option>
                    <option value="year">Năm nay</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Từ:</label>
                <input type="date" id="dateFrom">
                <label>Đến:</label>
                <input type="date" id="dateTo">
            </div>
            <div class="filter-group">
                <label>Loại:</label>
                <select id="typeFilter">
                    <option value="all">Tất cả</option>
                    <option value="thu">Thu</option>
                    <option value="chi">Chi</option>
                </select>
            </div>
            <button class="btn-filter" onclick="applyFilters()"><i class="fas fa-filter"></i> Áp dụng</button>
            <button class="btn-reset" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
        </div>

        <!-- Dashboard Content -->
        <div class="dashboard-grid" id="dashboardContent">
            <!-- Nội dung sẽ được render bằng JS -->
        </div>
    </div>
</div>
